<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ion Core Loading</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #07111d;
  color: white;
  overflow: hidden;
}

/* SIMPLE VERSION (your full styled one is already in lsm.html) */
.center {
  text-align: center;
  margin-top: 15%;
}

h1 { font-size: 60px; }
p { font-size: 18px; opacity: 0.8; }

.progress {
  width: 60%;
  height: 20px;
  margin: 30px auto;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #3046ea;
}
</style>
</head>

<body>

<div class="center">
  <h1>Ion Core Gaming</h1>
  <p>Loading your experience...</p>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p id="status">Retrieving server info...</p>
</div>

<script>
// ==========================
// MAP SWITCHING SYSTEM
// ==========================
const params = new URLSearchParams(window.location.search);
const map = params.get("map");

// 🔥 ONLY switch for this map
if (map === "rp_fortroadside_v1") {
    window.location.href = "lsm.html";
}

// ==========================
// FAKE LOADING SYSTEM
// ==========================
const bar = document.getElementById("bar");
const status = document.getElementById("status");

const messages = [
  "Retrieving server info...",
  "Downloading workshop content...",
  "Loading resources...",
  "Lua Started!"
];

let progress = 0;
let msgIndex = 0;

setInterval(() => {
  if (progress < 100) {
    progress += Math.random() * 5;
    if (progress > 100) progress = 100;
    bar.style.width = progress + "%";
  }
}, 200);

setInterval(() => {
  msgIndex = (msgIndex + 1) % messages.length;
  status.textContent = messages[msgIndex];
}, 2500);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reconnect!</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(180deg, #042b2d, #0b8f92);
      text-align: center;
    }

    h1 { font-size: 60px; margin-top: 40px; }
    h2 { font-size: 40px; margin-top: 20px; }

    .container {
      margin-top: 50px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 250px;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }

    .olive { background: #9b9950; }
    .purple { background: #7f4fa3; }
    .red { background: #9a4a4a; }

    .chat {
      width: 60%;
      margin: 30px auto;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      height: 200px;
    }

    input {
      width: 60%;
      padding: 10px;
      border: none;
    }
  </style>
</head>

<body>

<h1>Reconnect!</h1>
<p>Never lose the player's attention again.</p>

<h2 id="headline">
The server is changing map, or crashing please hold on...
</h2>

<div class="container">
  <button class="btn olive" id="reconnectStatus">Auto-reconnecting...</button>
  <button class="btn purple">Waiting for server...</button>
  <button class="btn purple">Map change detected</button>
  <button class="btn purple" onclick="window.open('https://discord.gg/yourinvite')">
    Join The Discord
  </button>
  <button class="btn red">Disconnect</button>
</div>

<div class="chat" id="chat">
  Connection opened.
</div>

<input type="text" placeholder="Enter a message..." id="chatInput" />

<script>
// =============================
// MAP DETECTION + REDIRECT
// =============================
const params = new URLSearchParams(window.location.search);
const map = params.get("map");

// 🔥 ONLY for this map
if (map === "rp_fortroadside_v1") {
    window.location.href = "https://live.gmod-lsm.com/s/?i=9a60095a";
}

// =============================
// SIMPLE RECONNECT TIMER
// =============================
let time = 15;
const reconnectStatus = document.getElementById("reconnectStatus");

setInterval(() => {
  reconnectStatus.innerText = "Auto-reconnecting in " + time + "s";
  if (time > 0) time--;
}, 1000);

// =============================
// SIMPLE CHAT (LOCAL ONLY)
// =============================
const input = document.getElementById("chatInput");
const chat = document.getElementById("chat");

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    chat.innerHTML += "<br><b>You:</b> " + input.value;
    input.value = "";
  }
});
</script>

</body>
</html>
